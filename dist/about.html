    <script defer>
        const cards = document.querySelectorAll('.card');
        let activeCategory = 'all';
        let activeCountry = 'all';
        
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.dataset.country) {
                    activeCountry = this.dataset.country;
                    document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                } else {
                    activeCategory = this.dataset.filter;
                    document.querySelectorAll('.cat-btn:not(.country-btn)').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                }
                cards.forEach(card => {
                    const catMatch = activeCategory === 'all' || card.dataset.category === activeCategory;
                    const countryMatch = activeCountry === 'all' || card.dataset.country === activeCountry;
                    card.style.display = (catMatch && countryMatch) ? 'block' : 'none';
                });
            });
        });
        
        let shown = false;
        document.addEventListener('mouseleave', (e) => {
            if (e.clientY < 0 && !shown) {
                shown = true;
                document.getElementById('exit-modal').style.display = 'block';
                document.getElementById('exit-link-btn').href = 'https://www.effectivecpmnetwork.com/pqxbs4r0q?key=906787aaf091812e7824f389f3acf1bc';
            }
        });
        document.addEventListener('click', (e) => {
            if (e.target.closest('a') && e.target.closest('a').href.includes(window.location.origin)) shown = false;
        });
        function closeExitModal() { document.getElementById('exit-modal').style.display = 'none'; }
    </script>
