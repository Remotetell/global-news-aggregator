name: Global SEO Content Pipeline

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies (for newspaper3k)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev python3-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Builder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZENMUX_API_KEY: ${{ secrets.ZENMUX_API_KEY }}
          AI_NATIVE_API_KEY: ${{ secrets.AI_NATIVE_API_KEY }}
          BAZAAR_API_KEY: ${{ secrets.BAZAAR_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python build.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          wrangler pages deploy dist --project-name=global-news-aggregator
